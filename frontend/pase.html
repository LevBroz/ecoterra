<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EcoTerra · Pase de entrada</title>
  <link rel="icon" type="image/jpeg" href="/assets/img/eco_logo.jpg" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="/assets/css/styles.css" rel="stylesheet" />
</head>
<body class="login-page d-flex align-items-center" style="min-height: 100dvh;">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-sm-9 col-md-6 col-lg-4">
        <div class="card shadow-sm">
          <div class="card-body p-4 text-center">
            <img src="/assets/img/eco_logo.jpg" alt="Logo EcoTerra" class="login-logo mb-3" />
            <h1 class="h5 mb-1">Pase de entrada</h1>
            <p class="text-muted small mb-3">Residencial EcoTerra</p>

            <div id="pass-content">
              <canvas id="qr-canvas" class="mb-3"></canvas>
              <p class="mb-1 fw-semibold" id="pass-caption"></p>
              <div class="alert alert-warning small mb-0 text-start">
                <i class="bi bi-exclamation-triangle-fill"></i>
                Muestra este código en portería. Es de <strong>un solo uso</strong>
                y válido únicamente el día indicado.
              </div>
            </div>

            <div id="pass-error" class="alert alert-danger d-none">
              Enlace de pase inválido. Pídele a tu anfitrión que te lo reenvíe.
            </div>
          </div>
        </div>
        <p class="text-center text-muted small mt-3">
          ¿Eres residente? <a href="/index.html">Ingresar a la app</a>
        </p>
      </div>
    </div>
  </div>

  <script type="module">
    import QRCode from 'https://cdn.jsdelivr.net/npm/qrcode@1.5.4/+esm';

    const params = new URLSearchParams(location.search);
    const token = params.get('t');
    const name = params.get('n') || 'Visitante';
    const date = params.get('d');

    const UUID_RE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i;

    function fmtDate(d) {
      if (!d) return '';
      return new Date(d + 'T00:00:00').toLocaleDateString('es', {
        weekday: 'long', day: '2-digit', month: 'long', year: 'numeric',
      });
    }

    if (!token || !UUID_RE.test(token)) {
      document.getElementById('pass-content').classList.add('d-none');
      document.getElementById('pass-error').classList.remove('d-none');
    } else {
      await QRCode.toCanvas(document.getElementById('qr-canvas'), token, {
        width: 260, margin: 1, color: { dark: '#4a1f2b', light: '#ffffff' },
      });
      document.getElementById('pass-caption').textContent =
        date ? `${name} · ${fmtDate(date)}` : name;
    }
  </script>
</body>
</html>
